databases:
  - name: studybud-db
    databaseName: studybud
    user: studybud
    plan: free

services:
  - type: web
    name: studybud
    env: python
    plan: free
    buildCommand: "./build.sh"
    startCommand: "gunicorn studybud.wsgi:application"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: studybud-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: WEB_CONCURRENCY
        value: 4
      - key: DEBUG
        value: "False"
